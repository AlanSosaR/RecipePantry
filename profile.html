<!DOCTYPE html>
<html lang="es" data-app-version="83">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title data-i18n="profileTitle">Mi Perfil - Recipe Pantry</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">

    <!-- Material 3 Expressive Infrastructure -->
    <script type="importmap">
        {
          "imports": {
            "lit": "https://cdn.jsdelivr.net/npm/lit@3/index.js",
            "lit/": "https://cdn.jsdelivr.net/npm/lit@3/",
            "@lit/localize": "https://cdn.jsdelivr.net/npm/@lit/localize/lit-localize.js",
            "@lit/reactive-element": "https://cdn.jsdelivr.net/npm/@lit/reactive-element@1/reactive-element.js",
            "@lit/reactive-element/": "https://cdn.jsdelivr.net/npm/@lit/reactive-element@1/",
            "lit-element/lit-element.js": "https://cdn.jsdelivr.net/npm/lit-element@4/lit-element.js",
            "lit-html": "https://cdn.jsdelivr.net/npm/lit-html@3/lit-html.js",
            "lit-html/": "https://cdn.jsdelivr.net/npm/lit-html@3/",
            "tslib": "https://cdn.jsdelivr.net/npm/tslib@2.6.2/tslib.es6.js",
            "@material/web/": "https://cdn.jsdelivr.net/npm/@material/web@1.0.1/"
          }
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1"
        rel="stylesheet" />

    <!-- Core Styles -->
    <link rel="stylesheet" href="css/styles.css?v=99">
    <link rel="stylesheet" href="css/components.css?v=99">

    <style>
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--on-surface);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            margin: 0;
        }

        .m3-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }

        .m3-top-bar {
            height: 56px;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.6rem;
            background: var(--bg);
        }

        .m3-top-bar .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .m3-top-bar h1 {
            font-family: var(--font-brand);
            font-size: 20px;
            font-weight: 700;
            color: var(--on-surface);
            margin: 0;
        }

        .m3-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            scroll-behavior: smooth;
        }

        .profile-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .profile-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 48px;
            text-align: center;
        }

        .avatar-large {
            width: 120px;
            height: 120px;
            background: var(--primary-light);
            color: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 0;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12), 0 0 0 4px var(--bg);
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .avatar-large:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.15), 0 0 0 4px var(--bg);
        }

        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: none;
        }

        .m3-field-container {
            position: relative;
            margin-bottom: 28px;
            width: 100%;
        }

        .m3-field-input,
        .m3-field-select {
            width: 100%;
            height: 56px;
            background: transparent;
            border: 1.5px solid var(--outline-variant);
            border-radius: 12px;
            padding: 0 16px;
            font-size: 16px;
            color: var(--on-surface);
            outline: none;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
        }

        .m3-field-input:focus,
        .m3-field-select:focus {
            border-color: var(--secondary);
            border-width: 2px;
        }

        .m3-field-label {
            position: absolute;
            left: 12px;
            top: 18px;
            padding: 0 4px;
            font-size: 16px;
            color: var(--on-surface-variant);
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            background: transparent;
        }

        .m3-field-input:focus+.m3-field-label,
        .m3-field-input:not(:placeholder-shown)+.m3-field-label,
        .m3-field-select:focus+.m3-field-label,
        .m3-field-select:not([value=""])+.m3-field-label {
            top: -10px;
            left: 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--secondary);
            background: var(--bg);
        }

        .m3-field-trailing {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--on-surface-variant);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
            color: var(--on-surface);
        }

        .section-header.clickable {
            cursor: pointer;
            padding: 8px;
            margin: -8px;
            margin-bottom: 24px;
            border-radius: 8px;
            transition: background 0.2s;
            user-select: none;
        }

        .section-header.clickable:hover {
            background: var(--primary-light);
            opacity: 0.8;
        }

        .section-header h3 {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0;
            flex: 1;
        }

        .security-content {
            display: none;
            flex-direction: column;
            animation: slideDown 0.3s ease-out;
        }

        .security-content.expanded {
            display: flex;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-save-m3 {
            width: 100%;
            height: 56px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            border-radius: 28px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
            margin-top: 12px;
        }

        .btn-save-m3:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.4);
            filter: brightness(1.1);
        }

        @media (max-width: 1023px) {
            .mobile-only {
                display: flex !important;
            }
        }

        @media (min-width: 1024px) {
            .mobile-only {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="window.toggleSidebar(false)"></div>

    <aside id="main-sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo" onclick="window.location.href='/'; window.closeSidebar();"
                style="cursor: pointer;">
                <img src="assets/icons/icon.svg" class="logo-icon" width="28" height="28" alt="Logo" />
                <span class="logo-text" style="color: var(--logo-color);">Recipe Pantry</span>
            </div>
        </div>
        <div class="sidebar-user-profile active">
            <div class="user-avatar-m3">
                <span id="sidebar-user-initials" class="user-initials-m3">..</span>
            </div>
            <div class="user-info-m3">
                <span id="sidebar-user-greeting" class="user-greeting" data-i18n="chefGreeting">Cargando...</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item">
                <span class="material-symbols-outlined">home</span>
                <span data-i18n="navRecipes">Recetas</span>
            </a>
            <a href="/?view=favorites" class="nav-item">
                <span class="material-symbols-outlined">star</span>
                <span data-i18n="navFavorites">Favoritos</span>
            </a>
            <a href="/ocr" class="nav-item">
                <span class="material-symbols-outlined">document_scanner</span>
                <span data-i18n="navScan">Escanear Receta</span>
            </a>
            <a href="/?view=shared" class="nav-item">
                <span class="material-symbols-outlined">share</span>
                <span data-i18n="navShared">Compartidas</span>
            </a>
            <a href="/?view=help" class="nav-item">
                <span class="material-symbols-outlined">help</span>
                <span data-i18n="navHelp">Ayuda</span>
            </a>
            <a href="#" class="nav-item nav-logout-m3" onclick="window.authManager.signOut()">
                <span class="material-symbols-outlined">logout</span>
                <span data-i18n="navLogout">Cerrar Sesión</span>
            </a>
        </nav>
    </aside>

    <main class="m3-main">
        <header class="m3-top-bar">
            <div class="left">
                <button id="btnMenuMobile" class="m3-icon-btn mobile-only">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <h1 data-i18n="profileHeader">Perfil</h1>
            </div>
            <div class="right">
                <!-- Initials removed intentionally -->
            </div>
        </header>

        <div class="m3-scroll">
            <div class="profile-container">
                <div class="profile-hero">
                    <div id="profile-hero-avatar" class="avatar-large" title="Cambiar foto de perfil">
                        <span id="avatar-initials">..</span>
                        <img id="avatar-img" src="" alt="Profile Picture" />

                        <input type="file" id="avatar-upload-input" accept="image/*" style="display: none;">
                    </div>
                </div>

                <form id="profile-form" novalidate>
                    <div class="section-header">
                        <span class="material-symbols-outlined">person</span>
                        <h3 data-i18n="profilePersonalInfo">Datos Personales</h3>
                    </div>

                    <div class="m3-field-container">
                        <select id="prefix" class="m3-field-select">
                            <option value="Chef">Chef</option>
                            <option value="Cook" data-i18n="prefixCook">Cocinero</option>
                            <option value="Baker" data-i18n="prefixBaker">Panadero</option>
                            <option value="Foodie">Foodie</option>
                        </select>
                        <label class="m3-field-label" data-i18n="profilePrefix">Título</label>
                    </div>

                    <div style="display: flex; gap: 12px;">
                        <div class="m3-field-container" style="flex: 1;">
                            <input id="first_name" class="m3-field-input" type="text" placeholder=" " required />
                            <label class="m3-field-label" data-i18n="profileFirstName">Nombre</label>
                        </div>
                        <div class="m3-field-container" style="flex: 1;">
                            <input id="last_name" class="m3-field-input" type="text" placeholder=" " required />
                            <label class="m3-field-label" data-i18n="profileLastName">Apellidos</label>
                        </div>
                    </div>

                    <div class="m3-field-container">
                        <input id="email" class="m3-field-input" type="email" placeholder=" " disabled
                            style="opacity: 0.6; cursor: not-allowed;" />
                        <label class="m3-field-label">Email</label>
                    </div>
                    <!-- Security -->
                    <div class="section-header clickable" style="margin-top: 32px;"
                        onclick="window.profileManager.toggleSecurity()">
                        <span class="material-symbols-outlined">security</span>
                        <h3 data-i18n="profileSecurity">Seguridad</h3>
                        <span id="security-chevron" class="material-symbols-outlined">expand_more</span>
                    </div>

                    <div id="security-content" class="security-content">
                        <div class="m3-field-container">
                            <input id="current_password" class="m3-field-input" type="password" placeholder=" " />
                            <label class="m3-field-label" data-i18n="profileCurrentPass">Contraseña Actual</label>
                            <div class="m3-field-trailing"
                                onclick="window.profileManager.togglePass('current_password', this)">
                                <span class="material-symbols-outlined">visibility</span>
                            </div>
                        </div>

                        <div class="m3-field-container">
                            <input id="new_password" class="m3-field-input" type="password" placeholder=" " />
                            <label class="m3-field-label" data-i18n="profileNewPass">Nueva Contraseña</label>
                            <div class="m3-field-trailing"
                                onclick="window.profileManager.togglePass('new_password', this)">
                                <span class="material-symbols-outlined">visibility</span>
                            </div>
                        </div>

                        <div class="m3-field-container">
                            <input id="confirm_password" class="m3-field-input" type="password" placeholder=" " />
                            <label class="m3-field-label" data-i18n="profileConfirmPass">Confirmar Nueva
                                Contraseña</label>
                            <div class="m3-field-trailing"
                                onclick="window.profileManager.togglePass('confirm_password', this)">
                                <span class="material-symbols-outlined">visibility</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="btn-save-profile" class="btn-save-m3">
                        <span class="material-symbols-outlined">check</span>
                        <span data-i18n="profileSaveBtn">Guardar cambios</span>
                    </button>
                    <div style="height: 48px;"></div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=99"></script>
    <script src="js/supabase-client.js?v=99"></script>
    <script src="js/auth.js?v=99"></script>
    <script src="js/utils.js?v=99"></script>
    <script src="js/i18n.js?v=99"></script>
    <script src="js/ui.js?v=99"></script>
    <script src="js/profile.js?v=99"></script>

    <script>
        document.documentElement.setAttribute('data-theme', 'light');
        window.addEventListener('load', () => {
            if (window.updateGlobalUserUI) window.updateGlobalUserUI();
            if (window.setupMobileMenu) window.setupMobileMenu();
        });
    </script>
</body>

</html>
