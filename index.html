<!DOCTYPE html>
<html lang="es" data-app-version="445">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#10B981">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recipe Pantry">
  <meta name="google" content="notranslate">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <script>
    // Essential Boot Logic
    const hasSession = Object.keys(localStorage).some(key => key.includes('auth-token'));
    if (hasSession) document.documentElement.setAttribute('data-auth-likely', 'true');
    document.documentElement.setAttribute('data-theme', 'light');
    console.log('🏁 UI Boot v445 - Restored');
  </script>

  <style>
    /* ─── Recipe Pantry Glassmorphism Landing ─── */
    :root {
      --m3-easing: cubic-bezier(0.2, 0.0, 0, 1.0);
      --primary-green: #10B981;
      --primary-green-light: #e8f7f2;
      --text-black: #1B1B1F;
      --text-grey: #888;
      --font-display: 'Poppins', sans-serif;
      --font-body: 'Poppins', sans-serif;
    }
    body { margin: 0; background-color: #f0f2f5; font-family: var(--font-body); }
    .mode-landing-wrapper { width: 100%; padding: 24px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; min-height: 100dvh; }
    .landing-unified-card { width: min(440px, 100%); background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 20px 80px rgba(0, 0, 0, 0.12); position: relative; animation: m3-fade-up 0.8s var(--m3-easing) forwards; }
    .hero-part { background: var(--primary-green); height: 200px; position: relative; border-bottom-left-radius: 50% 30%; border-bottom-right-radius: 50% 30%; display: flex; justify-content: center; }
    .hero-circle { position: absolute; bottom: -75px; width: 150px; height: 150px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); }
    .hero-circle-inner { width: 96px; height: 96px; background: var(--primary-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
    .content-part { padding: 90px 24px 32px; text-align: center; }
    .landing-title { font-size: 32px; font-weight: 800; color: var(--primary-green); margin: 0; }
    .landing-subtitle { color: var(--text-grey); margin-bottom: 24px; }
    .btn-comenzar { width: 100%; background: var(--primary-green); color: white; font-weight: 700; border-radius: 20px; padding: 16px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 16px; transition: all 0.3s; }
    @keyframes m3-fade-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none !important; }
  </style>
</head>

<body class="body-drive">
  <div id="landing-section" class="mode-landing-wrapper">
    <div class="landing-unified-card">
      <div class="hero-part">
        <div class="hero-circle">
          <div class="hero-circle-inner">
            <span class="material-symbols-outlined" style="font-size: 48px;">menu_book</span>
          </div>
        </div>
      </div>
      <div class="content-part">
        <h1 class="landing-title">Recipe Pantry</h1>
        <p class="landing-subtitle">Tu recetario, siempre contigo</p>
        <button class="btn-comenzar" onclick="window.location.href='/login'">
          <span>Comenzar</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD APP STRUCTURE (RESTORED v445) -->
  <div id="dashboard-app" class="dashboard-app hidden">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="window.dashboard.toggleSidebar(false)"></div>
    <div id="notification-bar" class="m3-notification-bar hidden">
      <div class="m3-notification-content">
        <span class="material-symbols-outlined spin" id="notification-icon">sync</span>
        <span id="notification-text">Sincronizando...</span>
      </div>
    </div>

    <aside id="main-sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="assets/icons/icon.svg" width="28" height="28" alt="Logo" />
          <span class="logo-text">Recipe Pantry</span>
        </div>
      </div>
      <div class="sidebar-user-profile">
        <div class="user-avatar-m3"><span id="sidebar-user-initials" class="user-initials-m3">CH</span></div>
        <div class="user-info-m3"><span id="sidebar-user-greeting" class="user-greeting">Chef</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="recipes"><span class="material-symbols-outlined">home</span><span>Recetas</span></a>
        <a href="#" class="nav-item" data-view="favorites"><span class="material-symbols-outlined">star</span><span>Favoritos</span></a>
        <a href="#" class="nav-item" onclick="window.location.href='/ocr'"><span class="material-symbols-outlined">document_scanner</span><span>Escanear</span></a>
        <a href="#" class="nav-item" data-view="shared"><span class="material-symbols-outlined">share</span><span>Compartidas</span></a>
        <a href="#" class="nav-item" onclick="window.authManager.signOut()"><span class="material-symbols-outlined">logout</span><span>Cerrar Sesión</span></a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-bar-m3">
        <button class="btn-menu-m3-premium mobile-only" onclick="window.dashboard.toggleSidebar(true)"><span class="material-symbols-outlined">menu</span></button>
        <div class="search-container-m3">
          <div class="search-wrapper-m3" id="searchWrapper">
            <span class="material-symbols-outlined">search</span>
            <input type="text" id="searchInput" placeholder="Buscar...">
          </div>
        </div>
      </header>

      <div class="dashboard-header">
        <h3 id="view-title">Mis Recetas</h3>
      </div>

      <div id="recipesGrid" class="recipes-grid">
        <div class="loading-inline"><div class="spinner-sm"></div><p>Cargando...</p></div>
      </div>

      <div id="emptyState" class="hidden" style="text-align: center; padding: 80px 0;">
        <span class="material-symbols-outlined" style="font-size: 80px; color: #E5E7EB;">folder_open</span>
        <h4 style="margin-top: 16px;">Aún no tienes recetas</h4>
        <button class="btn-comenzar" style="width: auto; margin: 24px auto;" onclick="window.location.href='/ocr'">
          <span class="material-symbols-outlined">document_scanner</span>
          <span>Escanear Receta</span>
        </button>
      </div>

      <button class="fab-m3" onclick="window.location.href='/recipe-form'"><span class="material-symbols-outlined">add</span></button>
    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
