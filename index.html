  <!-- NUCLEAR CACHE PURGE v450 -->
  <script>
    (async function() {
        const CURRENT_VERSION = 'v450';
        const lastCleared = localStorage.getItem('last_cache_purge');
        
        if (lastCleared !== CURRENT_VERSION) {
            console.log('☢️ NUCLEAR PURGE: Clearing all caches and Service Workers...');
            try {
                // 1. Unregister all SWs
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (let r of regs) { await r.unregister(); console.log('✅ SW Unregistered'); }
                }
                // 2. Delete all Caches
                if ('caches' in window) {
                    const keys = await caches.keys();
                    for (let k of keys) { await caches.delete(k); console.log('✅ Cache Deleted:', k); }
                }
                localStorage.setItem('last_cache_purge', CURRENT_VERSION);
                console.log('🏁 Purge Complete. Force Reloading...');
                window.location.reload(true);
            } catch (e) { console.error('Purge failed:', e); }
        }
    })();
  </script>

  <style>
    /* ─── Recipe Pantry Glassmorphism Landing ─── */
    :root {

    }
    body { margin: 0; background-color: #f0f2f5; font-family: var(--font-body); }
    .mode-landing-wrapper { width: 100%; padding: 24px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; min-height: 100dvh; }
    .landing-unified-card { width: min(440px, 100%); background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 20px 80px rgba(0, 0, 0, 0.12); position: relative; animation: m3-fade-up 0.8s var(--m3-easing) forwards; }
    .hero-part { background: var(--primary-green); height: 200px; position: relative; border-bottom-left-radius: 50% 30%; border-bottom-right-radius: 50% 30%; display: flex; justify-content: center; }
    .hero-circle { position: absolute; bottom: -75px; width: 150px; height: 150px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); }
    .hero-circle-inner { width: 96px; height: 96px; background: var(--primary-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
    .content-part { padding: 90px 24px 32px; text-align: center; }
    .landing-title { font-size: 32px; font-weight: 800; color: var(--primary-green); margin: 0; }
    .landing-subtitle { color: var(--text-grey); margin-bottom: 24px; }
    .btn-comenzar { width: 100%; background: var(--primary-green); color: white; font-weight: 700; border-radius: 20px; padding: 16px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 16px; transition: all 0.3s; }
    @keyframes m3-fade-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none !important; }

    /* ─── Notification UI v451 ─── */
    .btn-icon-m3 {
      width: 48px; height: 48px; border-radius: 50%; border: none; background: transparent;
      display: flex; align-items: center; justify-content: center; cursor: pointer; color: #1B1B1F;
      position: relative; transition: background 0.2s;
    }
    .btn-icon-m3:hover { background: rgba(0,0,0,0.05); }
    .m3-badge {
      position: absolute; top: 8px; right: 8px; background: #EF4444; color: white;
      font-size: 10px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid white;
    }
    .m3-notifications-panel {
      position: fixed; top: 70px; right: 16px; width: min(320px, 90vw); max-height: 480px;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); z-index: 11000;
      display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(0,0,0,0.05);
      animation: m3-fade-up 0.3s cubic-bezier(0.2, 0, 0, 1) forwards;
    }
    .notifications-header { padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .notifications-header h3 { margin: 0; font-size: 16px; font-weight: 700; color: #10B981; }
    .notifications-list { flex: 1; overflow-y: auto; }
    .bell-shake { animation: bell-shake 0.5s ease-in-out; }
    @keyframes bell-shake {
      0%, 100% { transform: rotate(0); }
      20% { transform: rotate(15deg); }
      40% { transform: rotate(-15deg); }
      60% { transform: rotate(10deg); }
      80% { transform: rotate(-10deg); }
    }
    .notification-item { padding: 12px 16px; border-bottom: 1px solid rgba(0,0,0,0.03); cursor: pointer; transition: background 0.2s; color: #333; }
    .notification-item:hover { background: rgba(0,0,0,0.02); }
    .notification-item.unread { background: #F0FDF4; }
    .notification-avatar { width: 32px; height: 32px; border-radius: 50%; background: #10B981; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
