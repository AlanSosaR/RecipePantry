  <script>
    // Essential Boot Logic
    const hasSession = Object.keys(localStorage).some(key => key.includes('auth-token'));
    if (hasSession) document.documentElement.setAttribute('data-auth-likely', 'true');
    document.documentElement.setAttribute('data-theme', 'light');
    console.log('🏁 UI Boot v444 - Stable');
  </script>

  <style>
    /* ─── Recipe Pantry Premium Landing ─── */
    :root {
      --m3-easing: cubic-bezier(0.2, 0.0, 0, 1.0);
      --primary-green: #10B981;
      --text-black: #1B1B1F;
    }
    body { margin: 0; background: #f0f2f5; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .mode-landing-wrapper { width: 100%; padding: 24px; box-sizing: border-box; display: flex; justify-content: center; }
    .landing-unified-card { width: min(440px, 100%); background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 20px 80px rgba(0,0,0,0.12); animation: m3-fade-up 0.8s var(--m3-easing); }
    .hero-part { background: var(--primary-green); height: 180px; position: relative; border-bottom-left-radius: 50% 20%; border-bottom-right-radius: 50% 20%; display: flex; justify-content: center; }
    .hero-circle { position: absolute; bottom: -60px; width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .hero-circle-inner { width: 80px; height: 80px; background: var(--primary-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
    .content-part { padding: 80px 24px 32px; text-align: center; }
    .landing-title { font-size: 28px; font-weight: 800; color: var(--primary-green); margin: 0; }
    .landing-subtitle { color: #888; margin: 8px 0 24px; }
    .btn-comenzar { width: 100%; background: var(--primary-green); color: white; padding: 16px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
    @keyframes m3-fade-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none !important; }
  </style>
</head>

<body>
  <div id="landing-section" class="mode-landing-wrapper">
    <div class="landing-unified-card">
      <div class="hero-part">
        <div class="hero-circle">
          <div class="hero-circle-inner">
            <span class="material-symbols-outlined" style="font-size: 40px;">menu_book</span>
          </div>
        </div>
      </div>
      <div class="content-part">
        <h1 class="landing-title">Recipe Pantry</h1>
        <p class="landing-subtitle">Tu recetario, siempre contigo</p>
        <button class="btn-comenzar" onclick="window.location.href='/login'">
          <span>Comenzar</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>
    </div>
  </div>

  <div id="dashboard-app" class="dashboard-app hidden">
    <!-- El dashboard se inyecta por dashboard.js -->
  </div>
