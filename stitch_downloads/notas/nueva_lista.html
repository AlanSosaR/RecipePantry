<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kitchen Notes - Checklist Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#002114",
                        "surface-variant": "#e1e3e4",
                        "tertiary-fixed": "#e4e2e4",
                        "surface-container-low": "#f3f4f5",
                        "surface-bright": "#f8f9fa",
                        "tertiary": "#5f5e60",
                        "primary-fixed-dim": "#5bdda8",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#939194",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#2b2a2d",
                        "inverse-surface": "#2e3132",
                        "primary-container": "#00a676",
                        "on-secondary-container": "#596764",
                        "surface": "#f8f9fa",
                        "surface-dim": "#d9dadb",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#003221",
                        "on-secondary": "#ffffff",
                        "secondary": "#53615e",
                        "primary-fixed": "#7afac3",
                        "surface-container": "#edeeef",
                        "on-primary-fixed-variant": "#005138",
                        "on-tertiary-fixed-variant": "#474649",
                        "on-surface-variant": "#3d4a42",
                        "secondary-container": "#d6e6e1",
                        "on-background": "#191c1d",
                        "secondary-fixed": "#d6e6e1",
                        "on-secondary-fixed": "#101e1b",
                        "surface-container-highest": "#e1e3e4",
                        "secondary-fixed-dim": "#bacac5",
                        "outline-variant": "#bccac0",
                        "error-container": "#ffdad6",
                        "primary": "#006c4b",
                        "background": "#f8f9fa",
                        "tertiary-fixed-dim": "#c8c6c8",
                        "surface-tint": "#006c4b",
                        "surface-container-high": "#e7e8e9",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#5bdda8",
                        "outline": "#6d7a72",
                        "on-surface": "#191c1d",
                        "on-secondary-fixed-variant": "#3b4a46",
                        "inverse-on-surface": "#f0f1f2",
                        "on-tertiary-fixed": "#1b1b1d",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "xl": "48px",
                        "margin-desktop": "40px",
                        "lg": "32px",
                        "gutter": "16px",
                        "margin-mobile": "20px",
                        "xs": "8px",
                        "sm": "16px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Epilogue"],
                        "title-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "display-lg": ["Epilogue"]
                    },
                    "fontSize": {
                        "headline-md": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .checked-item {
            text-decoration: line-through;
            opacity: 0.4;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #bccac0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface shadow-sm docked full-width top-0 flex items-center justify-between px-4 h-16 w-full sticky z-50">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-secondary-container transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-semibold text-primary">Kitchen Notes</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-secondary-container transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant">push_pin</span>
</button>
<button class="p-2 rounded-full hover:bg-secondary-container transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</button>
</div>
</header>
<main class="flex-1 max-w-[720px] mx-auto w-full px-margin-mobile md:px-0 py-lg">
<!-- Editor Header Area -->
<div class="">
<input class="w-full bg-transparent border-none focus:ring-0 font-display-lg text-display-lg text-on-surface placeholder:text-outline-variant p-0" placeholder="Title" type="text" value="Pasta Primavera Essentials"/>
</div>
<!-- Checklist Canvas -->
<div class="bg-surface-container-lowest rounded-[28px] border border-[#E6F6F1] shadow-sm p-sm mb-xl">
<!-- Active Items -->
<div class="space-y-base mb-sm">
<div class="group flex items-center gap-sm p-xs hover:bg-surface-container-low rounded-xl transition-colors">
<span class="material-symbols-outlined text-outline-variant cursor-grab active:cursor-grabbing">drag_indicator</span>
<label class="flex items-center flex-1 cursor-pointer">
<div class="relative flex items-center justify-center h-6 w-6 rounded border-2 border-primary mr-sm">
<input class="sr-only peer" type="checkbox"/>
<span class="material-symbols-outlined text-on-primary text-sm opacity-0 peer-checked:opacity-100 transition-opacity absolute">check</span>
<div class="absolute inset-0 bg-primary scale-0 peer-checked:scale-100 transition-transform rounded-[2px] -z-10"></div>
</div>
<span class="font-body-md text-on-surface">Organic Almond Milk</span>
</label>
<button class="opacity-0 group-hover:opacity-100 p-1 text-on-surface-variant hover:text-error transition-all">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<div class="group flex items-center gap-sm p-xs hover:bg-surface-container-low rounded-xl transition-colors">
<span class="material-symbols-outlined text-outline-variant cursor-grab active:cursor-grabbing">drag_indicator</span>
<label class="flex items-center flex-1 cursor-pointer">
<div class="relative flex items-center justify-center h-6 w-6 rounded border-2 border-primary mr-sm">
<input class="sr-only peer" type="checkbox"/>
<span class="material-symbols-outlined text-on-primary text-sm opacity-0 peer-checked:opacity-100 transition-opacity absolute">check</span>
<div class="absolute inset-0 bg-primary scale-0 peer-checked:scale-100 transition-transform rounded-[2px] -z-10"></div>
</div>
<span class="font-body-md text-on-surface">Fresh Basil Leaves</span>
</label>
<button class="opacity-0 group-hover:opacity-100 p-1 text-on-surface-variant hover:text-error transition-all">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Add Item Row -->
<div class="flex items-center gap-sm p-xs">
<div class="w-6 h-6 ml-gutter"></div> <!-- Spacer for drag handle -->
<span class="material-symbols-outlined text-primary">add</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-on-surface-variant placeholder:text-outline-variant p-0" placeholder="Add item" type="text"/>
</div>
</div>
<!-- Divider -->
<div class="h-[1px] bg-outline-variant mx-gutter opacity-20 mb-sm"></div>
<!-- Completed Items -->
<div class="space-y-base">
<button class="flex items-center gap-xs px-xs py-base text-on-surface-variant font-label-caps text-label-caps">
<span class="material-symbols-outlined text-[18px]">keyboard_arrow_down</span>
                    1 Completed Item
                </button>
<div class="flex items-center gap-sm p-xs opacity-60">
<div class="w-6 h-6 ml-gutter"></div> <!-- Spacer -->
<div class="relative flex items-center justify-center h-6 w-6 rounded bg-primary">
<span class="material-symbols-outlined text-on-primary text-sm" data-weight="fill">check</span>
</div>
<span class="font-body-md text-on-surface line-through">Whole Wheat Linguine</span>
</div>
</div>
</div>
<!-- Bento Context Area -->
</main>
<!-- Bottom Toolbar / Shell -->
<!-- Floating Timer (Specialized Component) -->
</body></html>
