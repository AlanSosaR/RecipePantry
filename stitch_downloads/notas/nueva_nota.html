<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8f9fa;
        }
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 10px;
        }
        .editor-focus:focus {
            outline: none;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {

            border-radius: 10px;

<body class="font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-background shadow-sm flex items-center justify-between px-4 h-16 w-full sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="text-primary dark:text-primary-fixed-dim hover:bg-secondary-container dark:hover:bg-on-secondary-fixed-variant transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-semibold text-primary dark:text-primary-fixed-dim">Kitchen Notes</h1>
</div>
<div class="flex items-center gap-2">
<button class="text-on-surface-variant dark:text-surface-variant hover:bg-secondary-container dark:hover:bg-on-secondary-fixed-variant transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">push_pin</span>
</button>
<button class="text-on-surface-variant dark:text-surface-variant hover:bg-secondary-container dark:hover:bg-on-secondary-fixed-variant transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<main class="max-w-[720px] mx-auto px-margin-mobile md:px-0 pt-lg min-h-[calc(100vh-128px)] flex flex-col pb-32">
<!-- Editor Canvas -->
<div class="flex-grow">
<!-- Title Area -->
<div class="mb-sm">
<input class="w-full bg-transparent border-none font-display-lg text-display-lg text-on-surface placeholder:text-outline-variant editor-focus p-0 focus:ring-0" placeholder="Title" type="text"/>
</div>
<!-- Meta Tags / Chips Row -->
<!-- Body Area -->
<div class="relative">
<textarea class="w-full bg-transparent border-none font-body-md text-body-md text-on-surface-variant placeholder:text-outline-variant editor-focus p-0 focus:ring-0 min-h-[400px] resize-none leading-relaxed" placeholder="Start typing your culinary masterpiece..."></textarea>
</div>
<!-- Inline Image Preview (Premium Card) -->
</div>
<!-- Persisting Floating Culinary Timer (Themed Component) -->
</main>
<!-- Bottom Utility Toolbar & Status -->
<!-- Side Navigation Drawer (Hidden on mobile via trigger if needed, persistent on Desktop if requested) -->
<div class="fixed top-0 left-0 h-full w-80 bg-surface-bright dark:bg-inverse-surface shadow-xl rounded-r-[28px] -translate-x-full transition-transform duration-300 z-[60]" id="drawer">
<div class="flex flex-col h-full py-4">
<div class="px-6 py-6 mb-4 flex items-center gap-4">
<div class="w-12 h-12 rounded-full overflow-hidden border-2 border-primary-fixed">

</div>
<div>
<h3 class="font-title-sm text-title-sm text-on-surface">Head Chef</h3>
<p class="text-body-md text-on-surface-variant text-[12px]">culinary.pro@notes.com</p>
</div>
</div>

<span class="font-body-md text-body-md">Settings</span>
