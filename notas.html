<!DOCTYPE html>
<html lang="es" data-app-version="v500">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <title data-i18n="navNotes">Notas - Recipe Pantry</title>

    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">

    <!-- Fuentes e Iconos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <!-- Estilos Base -->
    <link rel="stylesheet" href="css/styles.css?v=500">
    <link rel="stylesheet" href="css/components.css?v=500">
    <link rel="stylesheet" href="css/notas.css?v=500">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- CORE SCRIPTS -->
    <script src="js/config.js?v=500"></script>
    <script src="js/supabase-client.js?v=500"></script>
    <script src="js/utils.js?v=500"></script>
    <script src="js/i18n.js?v=500"></script>
    <script src="js/auth.js?v=500"></script>
    <script src="js/localdb.js?v=500"></script>
    <script src="js/db.js?v=500"></script>
    <script src="js/ui.js?v=500"></script>
    
    <!-- Notas Specific Scripts -->
    <script defer src="js/notas.js?v=500"></script>

    <script>
        document.documentElement.setAttribute('data-theme', 'light');
    </script>
</head>

<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <header class="app-header-m3">
        <div class="header-left">
            <button class="icon-btn-m3" onclick="window.location.href='/'">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="header-title-m3" data-i18n="navNotes">Notas Culinarias</h1>
        </div>
    </header>

    <div class="background-accent">
        <div class="accent-blob"></div>
    </div>

    <!-- Main Content Canvas -->
    <main class="notas-container" id="notas-main-container">
        
        <div class="loading-spinner-container" id="loading-state">
            <div class="loading-spinner"></div>
            <span data-i18n="loading">Cargando...</span>
        </div>

        <!-- Empty State -->
        <div class="notas-empty-state" id="empty-state" style="display: none;">
            <span class="material-symbols-outlined empty-icon">edit_document</span>
            <h2 data-i18n="notesEmptyTitle">Tu viaje culinario comienza aquí</h2>
            <p data-i18n="notesEmptyDesc">Captura tus recetas, ideas o listas de compras para construir tu libro de cocina digital personal.</p>
            
            <div class="notas-quick-chips">
                <span class="chip" onclick="window.notasManager.createNewNote('checklist')" data-i18n="actionChecklist">Lista de Compras</span>
                <span class="chip" onclick="window.notasManager.createNewNote('text')" data-i18n="actionQuickNote">Nota Rápida</span>
            </div>
        </div>

        <!-- Masonry-style Grid -->
        <div class="recipe-masonry" id="notes-grid" style="display: none;">
            <!-- Notes will be populated here by JS -->
        </div>

    </main>

    <!-- Floating Action Button Cluster -->
    <div class="fab-container" id="fab-container">
        <div class="fab-actions">
            <!-- Action Item 1 -->
            <button class="fab-action-btn" onclick="window.notasManager.createNewNote('checklist')">
                <span class="fab-action-label" data-i18n="actionChecklist">Lista</span>
                <div class="fab-action-icon">
                    <span class="material-symbols-outlined">checklist</span>
                </div>
            </button>
            <!-- Action Item 2 -->
            <button class="fab-action-btn" onclick="window.notasManager.createNewNote('text')">
                <span class="fab-action-label" data-i18n="actionTextNote">Nota de Texto</span>
                <div class="fab-action-icon">
                    <span class="material-symbols-outlined">description</span>
                </div>
            </button>
        </div>
        
        <!-- Primary FAB -->
        <button class="main-fab" id="main-fab-btn" onclick="document.getElementById('fab-container').classList.toggle('active')">
            <span class="material-symbols-outlined">add</span>
        </button>
    </div>

</body>
</html>
