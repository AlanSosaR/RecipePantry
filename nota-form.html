<!DOCTYPE html>
<html lang="es" data-app-version="v500">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <title data-i18n="editNote">Editar Nota - Recipe Pantry</title>

    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">

    <!-- Fuentes e Iconos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <!-- Estilos Base -->
    <link rel="stylesheet" href="css/styles.css?v=500">
    <link rel="stylesheet" href="css/components.css?v=500">
    <link rel="stylesheet" href="css/notas.css?v=500">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- CORE SCRIPTS -->
    <script src="js/config.js?v=500"></script>
    <script src="js/supabase-client.js?v=500"></script>
    <script src="js/utils.js?v=500"></script>
    <script src="js/i18n.js?v=500"></script>
    <script src="js/auth.js?v=500"></script>
    <script src="js/localdb.js?v=500"></script>
    <script src="js/db.js?v=500"></script>
    <script src="js/ui.js?v=500"></script>
    
    <!-- Notas Specific Scripts -->
    <script defer src="js/notas.js?v=500"></script>

    <script>
        document.documentElement.setAttribute('data-theme', 'light');
    </script>
</head>

<body class="body-drive">
    <div id="dashboard-app" class="dashboard-app">
        <!-- Sidebar Overlay for mobile -->
        <div id="sidebar-overlay" class="sidebar-overlay" onclick="window.dashboard.toggleSidebar(false)"></div>
        
        <!-- Sidebar -->
        <aside id="main-sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo" onclick="window.location.href='/'; window.closeSidebar();" style="cursor: pointer;">
                    <img src="assets/icons/icon.svg" class="logo-icon" width="28" height="28" alt="Logo" />
                    <span class="logo-text">Recipe Pantry</span>
                </div>
            </div>
            <div class="sidebar-user-profile">
                <div class="user-avatar-m3">
                    <span id="sidebar-user-initials" class="user-initials-m3">CH</span>
                </div>
                <div class="user-info-m3">
                    <span id="sidebar-user-greeting" class="user-greeting" data-i18n="chefGreeting">Chef</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">
                    <span class="material-symbols-outlined">home</span>
                    <span data-i18n="navRecipes">Recetas</span>
                </a>
                <a href="/#favorites" class="nav-item">
                    <span class="material-symbols-outlined">star</span>
                    <span data-i18n="navFavorites">Favoritos</span>
                </a>
                <a href="/ocr" class="nav-item">
                    <span class="material-symbols-outlined">document_scanner</span>
                    <span data-i18n="navScan">Escanear Receta</span>
                </a>
                <a href="/notas" class="nav-item active">
                    <span class="material-symbols-outlined">edit_note</span>
                    <span data-i18n="navNotes">Notas</span>
                </a>
                <a href="/#shared" class="nav-item">
                    <span class="material-symbols-outlined">share</span>
                    <span data-i18n="navShared">Compartidas</span>
                </a>
                <a href="/#help" class="nav-item">
                    <span class="material-symbols-outlined">help</span>
                    <span data-i18n="navHelp">Ayuda</span>
                </a>
                <a href="#" class="nav-item nav-logout-m3" onclick="window.authManager.signOut()">
                    <span class="material-symbols-outlined">logout</span>
                    <span data-i18n="navLogout">Cerrar Sesión</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-icon-m3 sidebar-toggle-btn desktop-only" style="width: 100%; justify-content: flex-start; padding-left: 16px;" onclick="window.dashboard.toggleSlimSidebar()">
                    <span class="material-symbols-outlined">side_navigation</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Canvas -->
        <main class="main-content relative">
            <header class="top-bar-m3">
                <div class="header-title-wrapper" style="display: flex; align-items: center; gap: 8px;">
                    <button class="icon-btn-m3" onclick="window.history.back()">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </button>
                    <h1 class="header-title-m3" data-i18n="editNote" style="font-size: 20px; font-weight: 600; color: var(--primary-green); margin: 0;">Editar Nota</h1>
                </div>
                <div class="top-bar-actions-m3" style="display: flex; gap: 8px; align-items: center;">
                    <button class="icon-btn-m3 text-error" id="delete-note-btn" style="display: none;" onclick="window.notasManager.deleteCurrentNote()">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                    <button class="icon-btn-m3" onclick="window.notasManager.saveNote()" style="color: var(--primary-green);" title="Guardar">
                        <span class="material-symbols-outlined">push_pin</span>
                    </button>
                </div>
            </header>

            <div class="background-accent">
                <div class="accent-blob" style="top: 50%; left: 80%; transform: translate(-50%, -50%); opacity: 0.5;"></div>
            </div>

            <!-- Editor Content -->
            <div class="note-editor-container" id="editor-container" style="flex-grow: 1; margin: 0;">
                
                <div class="loading-spinner-container" id="loading-state">
                    <div class="loading-spinner"></div>
                </div>

                <div id="editor-form" style="display: none; display: flex; flex-direction: column; flex-grow: 1;">
                    <!-- Title -->
                    <input type="text" id="note-title" class="note-title-input" placeholder="Título de la nota..." data-i18n-placeholder="noteTitlePlaceholder" autocomplete="off">
                    
                    <!-- Type Toggle hidden logically, we decide type by URL param or fetch -->
                    <input type="hidden" id="note-type" value="text">
                    
                    <!-- Text Content -->
                    <textarea id="note-content" class="note-content-input" placeholder="Escribe tu nota aquí..." data-i18n-placeholder="noteContentPlaceholder"></textarea>

                    <!-- Checklist Content -->
                    <div id="checklist-container" style="display: none; flex-direction: column; flex-grow: 1;">
                        <div class="checklist-editor" id="checklist-items">
                            <!-- Items populated via JS -->
                        </div>
                        
                        <button class="add-checklist-item-btn" onclick="window.notasManager.addChecklistItem()">
                            <span class="material-symbols-outlined">add</span>
                            <span data-i18n="addChecklistItem">Agregar elemento</span>
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>
</body>
</html>
