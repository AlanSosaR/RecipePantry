<!DOCTYPE html>
<html lang="es" data-app-version="220">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Nueva Contraseña - Recipe Pantry</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />

    <!-- Core Styles -->
    <link rel="stylesheet" href="css/styles.css?v=227">
    <link rel="stylesheet" href="css/components.css?v=227">

    <style>
        :root {
            --m3-easing: cubic-bezier(0.2, 0.0, 0, 1.0);
            --m3-duration-long: 500ms;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
        }

        .reset-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 32px;
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.12);
            padding: 4.8rem 2.8rem 3.2rem;
            border: 1px solid var(--outline-variant);
            width: min(400px, 92vw);
            max-width: 400px;
            text-align: center;
            animation: m3-fade-up 0.6s var(--m3-easing) forwards;
        }

        .reset-header { margin-bottom: 24px; }
        .reset-title { font-weight: 800; font-size: 24px; color: #111827; margin: 0 0 8px 0; }
        .reset-subtitle { font-size: 14px; color: var(--on-surface-variant); line-height: 1.6; }

        .m3-field-container { position: relative; margin-bottom: 24px; width: 100%; text-align: left; }
        .m3-field-input {
            width: 100%; height: 56px; background: transparent;
            border: 1.5px solid var(--outline-variant); border-radius: 12px;
            padding: 0 16px; font-size: 16px; color: var(--on-surface);
            outline: none; transition: all 0.2s; box-sizing: border-box;
        }
        .m3-field-input:focus { border-color: var(--primary); border-width: 2px; }
        .m3-field-label {
            position: absolute; left: 12px; top: 18px; padding: 0 4px;
            font-size: 16px; color: var(--on-surface-variant); pointer-events: none;
            transition: all 0.2s var(--m3-easing);
        }
        .m3-field-input:focus + .m3-field-label, 
        .m3-field-input:not(:placeholder-shown) + .m3-field-label {
            top: -10px; left: 12px; font-size: 12px; font-weight: 700;
            color: var(--primary); background: white;
        }

        .btn-m3-full {
            width: 100%; min-height: 48px; border-radius: 28px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer;
            background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s; box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }
        .btn-m3-full:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-m3-full:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        @keyframes m3-fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .m3-field-trailing {
            position: absolute;
            right: 8px;
            top: 28px;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--on-surface-variant);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .m3-field-trailing:hover {
            background: rgba(0,0,0,0.05);
        }

        .validation-status {
            font-size: 11px;
            font-weight: 700;
            display: block;
            margin-top: 4px;
            transition: all 0.3s;
            height: 16px;
            margin-left: 4px;
        }

        .m3-field-container.verified .m3-field-label {
            color: var(--primary) !important;
        }
        
        .m3-field-container.verified .m3-field-input {
            border-color: var(--primary);
        }

        #loading-state {
            padding: 40px 0;
        }

        .spinner-m3 {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(16, 185, 129, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            margin: 0 auto 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <!-- Flow: Loading -->
        <div id="reset-loading-state">
            <div class="spinner-m3"></div>
            <p class="reset-subtitle" data-i18n="resetVerifying">Verificando enlace de seguridad...</p>
        </div>

        <!-- Flow: Normal -->
        <div id="reset-normal-state" style="display: none;">
            <div class="reset-header">
                <h1 class="reset-title" data-i18n="resetTitle" style="font-size: 28px; font-weight: 800;">Restablecer Contraseña</h1>
                <p class="reset-subtitle" data-i18n="resetSubtitle">Escribe tu nueva contraseña para acceder a tu cuenta.</p>
            </div>

            <form id="reset-form">
                <div id="new-pass-container" class="m3-field-container">
                    <input class="m3-field-input" id="new_password" type="password" placeholder=" " required oninput="validateNewPassword(this.value)" />
                    <label class="m3-field-label" for="new_password" data-i18n="resetNewPasswordLabel">Nueva Contraseña</label>
                    <div class="m3-field-trailing" onclick="togglePass('new_password', this)">
                        <span class="material-symbols-outlined">visibility</span>
                    </div>
                    <span id="new-password-status" class="validation-status"></span>
                </div>
                
                <div id="confirm-pass-container" class="m3-field-container">
                    <input class="m3-field-input" id="confirm_password" type="password" placeholder=" " required oninput="validateConfirmPassword(this.value)" />
                    <label class="m3-field-label" for="confirm_password" data-i18n="resetConfirmLabel">Confirmar Contraseña</label>
                    <div class="m3-field-trailing" onclick="togglePass('confirm_password', this)">
                        <span class="material-symbols-outlined">visibility</span>
                    </div>
                    <span id="confirm-password-status" class="validation-status"></span>
                </div>

                <button type="submit" id="btn-submit" class="btn-m3-full" style="padding: 16px;">
                    <span id="btn-text" data-i18n="resetBtn">Actualizar contraseña</span>
                    <span class="material-symbols-outlined" style="font-size: 24px;">lock_reset</span>
                </button>
            </form>
        </div>

        <!-- Flow: Invalid Link -->
        <div id="reset-error-state" style="display: none;">
            <div class="reset-header">
                <div style="background: #FEE2E2; color: #EF4444; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
                    <span class="material-symbols-outlined" style="font-size: 32px;">link_off</span>
                </div>
                <h1 class="reset-title" data-i18n="resetInvalidLink">Enlace inválido o expirado</h1>
                <p class="reset-subtitle" data-i18n="resetInvalidLinkDesc">Por seguridad, los enlaces sólo sirven una vez. Debes enviar otro enlace.</p>
            </div>
            <button class="btn-m3-full" onclick="window.location.href='recovery.html'" style="background: #374151;">
                <span data-i18n="btnRequestNewLink">Solicitar nuevo enlace</span>
                <span class="material-symbols-outlined">refresh</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=227"></script>
    <script src="js/supabase-client.js?v=227"></script>
    <script src="js/i18n.js?v=227"></script>
    <script src="js/auth.js?v=227"></script>
    <script src="js/utils.js?v=227"></script>

    <script>
        let sessionCheckTimeout;

        async function initAuthHandling() {
            // 1. Check current session immediately
            const { data } = await window.supabaseClient.auth.getSession();
            if (data.session) {
                showNormalState();
                return;
            }

            // 2. Listen for auth changes (tokens from hash)
            window.supabaseClient.auth.onAuthStateChange((event, session) => {
                if (session) {
                    showNormalState();
                }
            });

            // 3. Heartbeat/Timeout: If no session after 3 seconds, show error
            sessionCheckTimeout = setTimeout(() => {
                window.supabaseClient.auth.getSession().then(({data}) => {
                    if (!data.session) {
                        showErrorState();
                    }
                });
            }, 3000);
        }

        function showNormalState() {
            if (sessionCheckTimeout) clearTimeout(sessionCheckTimeout);
            document.getElementById('reset-loading-state').style.display = 'none';
            document.getElementById('reset-error-state').style.display = 'none';
            document.getElementById('reset-normal-state').style.display = 'block';
        }

        function showErrorState() {
            document.getElementById('reset-loading-state').style.display = 'none';
            document.getElementById('reset-normal-state').style.display = 'none';
            document.getElementById('reset-error-state').style.display = 'block';
        }

        initAuthHandling();

        function togglePass(inputId, iconElement) {
            const input = document.getElementById(inputId);
            const icon = iconElement.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function validateNewPassword(value) {
            const statusEl = document.getElementById('new-password-status');
            const container = document.getElementById('new-pass-container');
            if (!value) {
                statusEl.textContent = '';
                container.classList.remove('verified');
                return;
            }

            if (value.length < 6) {
                statusEl.textContent = '✗ Mínimo 6 caracteres';
                statusEl.style.color = '#EF4444';
                container.classList.remove('verified');
            } else {
                statusEl.textContent = '✓ Longitud válida';
                statusEl.style.color = '#10B981';
                container.classList.add('verified');
            }
            validateConfirmPassword(document.getElementById('confirm_password').value);
        }

        function validateConfirmPassword(value) {
            const statusEl = document.getElementById('confirm-password-status');
            const container = document.getElementById('confirm-pass-container');
            const newPass = document.getElementById('new_password').value;
            
            if (!value) {
                statusEl.textContent = '';
                container.classList.remove('verified');
                return;
            }

            if (value !== newPass) {
                statusEl.textContent = '✗ Las contraseñas no coinciden';
                statusEl.style.color = '#EF4444';
                container.classList.remove('verified');
            } else if (value.length >= 6) {
                statusEl.textContent = '✓ Las contraseñas coinciden';
                statusEl.style.color = '#10B981';
                container.classList.add('verified');
            } else {
                statusEl.textContent = '';
                container.classList.remove('verified');
            }
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            const btn = document.getElementById('btn-submit');
            const span = document.getElementById('btn-text');

            if (pass.length < 6 || pass !== confirm) return;

            btn.disabled = true;
            const originalBtnText = span.textContent;
            span.textContent = window.i18n ? window.i18n.t('msgSaving') : "Actualizando...";

            try {
                const res = await window.authManager.updatePassword(pass);
                if (res.success) {
                    window.showToast("Contraseña actualizada con éxito", "success");
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    throw new Error(res.error);
                }
            } catch (err) {
                window.showToast(err.message, "error");
                btn.disabled = false;
                span.textContent = originalBtnText;
            }
        });

        window.addEventListener('load', () => {
            if(window.i18n) window.i18n.applyLanguage(window.i18n.getLang());
        });
    </script>
</body>
</html>
