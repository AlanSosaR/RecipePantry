<!DOCTYPE html>
<html lang="es" data-app-version="171">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Recuperar Contraseña - Recipe Pantry</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />

    <!-- Core Styles -->
    <link rel="stylesheet" href="css/styles.css?v=171">
    <link rel="stylesheet" href="css/components.css?v=171">

    <style>
        :root {
            --m3-easing: cubic-bezier(0.2, 0.0, 0, 1.0);
            --m3-duration-long: 500ms;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
        }

        .recovery-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 32px;
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.12);
            padding: 4.8rem 2.8rem 3.2rem;
            border: 1px solid var(--outline-variant);
            width: min(400px, 92vw);
            max-width: 400px;
            text-align: center;
            animation: m3-fade-up 0.6s var(--m3-easing) forwards;
        }

        .recovery-header { margin-bottom: 24px; }
        .recovery-title { font-weight: 800; font-size: 24px; color: #111827; margin: 0 0 8px 0; }
        .recovery-subtitle { font-size: 14px; color: var(--on-surface-variant); line-height: 1.6; }

        .m3-field-container { position: relative; margin-bottom: 32px; width: 100%; text-align: left; }
        .m3-field-input {
            width: 100%; height: 56px; background: transparent;
            border: 1.5px solid var(--outline-variant); border-radius: 12px;
            padding: 0 16px; font-size: 16px; color: var(--on-surface);
            outline: none; transition: all 0.2s; box-sizing: border-box;
        }
        .m3-field-input:focus { border-color: var(--primary); border-width: 2px; }
        .m3-field-label {
            position: absolute; left: 12px; top: 18px; padding: 0 4px;
            font-size: 16px; color: var(--on-surface-variant); pointer-events: none;
            transition: all 0.2s var(--m3-easing);
        }
        .m3-field-input:focus + .m3-field-label, 
        .m3-field-input:not(:placeholder-shown) + .m3-field-label {
            top: -10px; left: 12px; font-size: 12px; font-weight: 700;
            color: var(--primary); background: white;
        }

        .btn-m3-full {
            width: 100%; min-height: 48px; border-radius: 28px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer;
            background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s; box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }
        .btn-m3-full:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-m3-full:disabled { opacity: 0.6; cursor: not-allowed; }

        @keyframes m3-fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="recovery-card">
        <div class="recovery-header">
            <img src="assets/icons/icon.svg" width="48" height="48" alt="Logo" style="margin-bottom: 16px;" />
            <h1 class="recovery-title">¿Olvidaste tu contraseña?</h1>
            <p class="recovery-subtitle">Introduce tu correo electrónico y te enviaremos un enlace para restablecerla.</p>
        </div>

        <form id="recovery-form">
            <div class="m3-field-container">
                <input class="m3-field-input" id="email" type="email" placeholder=" " required />
                <label class="m3-field-label" for="email">Email</label>
            </div>

            <button type="submit" id="btn-submit" class="btn-m3-full">
                <span id="btn-text">Enviar enlace</span>
                <span class="material-symbols-outlined">send</span>
            </button>
        </form>

        <button type="button" onclick="window.location.href='/login'" class="btn-m3-text" style="color: var(--primary); font-size: 14px; margin-top: 24px; background: none; border: none; cursor: pointer; font-weight: 600;">
            Volver al inicio de sesión
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=171"></script>
    <script src="js/supabase-client.js?v=171"></script>
    <script src="js/auth.js?v=171"></script>
    <script src="js/utils.js?v=171"></script>

    <script>
        document.getElementById('recovery-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('btn-submit');
            const span = document.getElementById('btn-text');

            if (!email) return;

            btn.disabled = true;
            span.textContent = "Enviando...";

            try {
                const res = await window.authManager.resetPassword(email);
                if (res.success) {
                    window.showToast("Enlace enviado correctamente. Revisa tu correo.", "success");
                    setTimeout(() => window.location.href = '/login', 3000);
                } else {
                    throw new Error(res.error);
                }
            } catch (err) {
                window.showToast(err.message, "error");
                btn.disabled = false;
                span.textContent = "Enviar enlace";
            }
        });
    </script>
</body>
</html>
